<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{{url_for('static', filename='usuarios.css')}}">
</head>

<body>

<div class="modal fade" id="myModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 p-2"
             style="background-color:#1a1d27; box-shadow:0 20px 60px rgba(0,0,0,0.6);">

            <div class="modal-header border-0">
                <h5 class="modal-title text-white fw-bold w-100 text-center" style="font-size:1.6rem;">
                    Registrar Usuario
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body px-4 pb-4">
                <form action="{{ url_for('guardar_usuario') }}" method="POST">

                    <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" name="nombre_usuario" class="form-control input-dark"
                               placeholder="Nombre de usuario" required>
                    </div>

                    <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" name="contraseña_usuario" class="form-control input-dark"
                               placeholder="Contraseña" required>
                    </div>

                    <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-shield-fill"></i>
                        </span>
                        <select name="rol_usuario" class="form-select input-dark" required>
                            <option value="" disabled selected hidden>Seleccionar rol</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Empleado">Empleado</option>
                        </select>
                    </div>

                    <div class="input-group mb-4 rounded-3 overflow-hidden input-focus">
                        <span class="input-group-text input-icon">
                            <i class="bi bi-id-card-fill"></i>
                        </span>
                        <input type="text" name="documento_usuario" class="form-control input-dark"
                               placeholder="Documento del empleado" required>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="button" class="btn w-50 btn-cancelar rounded-3"
                                data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn w-50 btn-guardar rounded-3">
                            Guardar
                        </button>
                    </div>
                    <a href="{{url_for('inicio')}}"></a>
                </form>
            </div>
        </div>
    </div>
</div>

</body>

</html>
