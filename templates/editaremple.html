<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='editarusuario.css') }}">
</head>
<body>

<div class="login-card">

    <h2 class="text-white fw-bold text-center mb-4">Editar Empleado</h2>

    <form action="{{ url_for('actualizar_emple') }}" method="POST">

        <input type="hidden" name="id_empleado" value="{{ emple[0] }}">

        <!-- Nombre -->
        <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
            <span class="input-group-text input-icon">
                <i class="bi bi-person-fill"></i>
            </span>
            <input type="text" name="nombre_empleado"
                   class="form-control input-dark"
                   value="{{ emple[2] }}" placeholder="Nombre" required>
        </div>

        <!-- Apellido -->
        <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
            <span class="input-group-text input-icon">
                <i class="bi bi-person-fill"></i>
            </span>
            <input type="text" name="apellido_empleado"
                   class="form-control input-dark"
                   value="{{ emple[3] }}" placeholder="Apellido" required>
        </div>

        <!-- Cargo -->
        <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
            <span class="input-group-text input-icon">
                <i class="bi bi-briefcase-fill"></i>
            </span>
            <select name="cargo_empleado" class="form-select input-dark" required>
                <option value="" disabled hidden>Seleccionar cargo</option>
                <option value="Gerente"       {% if emple[4] == 'Gerente'       %}selected{% endif %}>Gerente</option>
                <option value="Administrador" {% if emple[4] == 'Administrador' %}selected{% endif %}>Administrador</option>
                <option value="Contador"      {% if emple[4] == 'Contador'      %}selected{% endif %}>Contador</option>
                <option value="Otro"          {% if emple[4] == 'Otro'          %}selected{% endif %}>Otro</option>
            </select>
        </div>

        <!-- Área -->
        <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
            <span class="input-group-text input-icon">
                <i class="bi bi-building-fill"></i>
            </span>
            <select name="area_empleado" class="form-select input-dark" required>
                <option value="" disabled hidden>Seleccionar área</option>
                {% for area in areas %}
                    <option value="{{ area[0] }}"
                        {% if area[0] == emple[12] %}selected{% endif %}>
                        {{ area[1] }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Horas Extras -->
        <div class="input-group mb-3 rounded-3 overflow-hidden input-focus">
            <span class="input-group-text input-icon">
                <i class="bi bi-clock-fill"></i>
            </span>
            <input type="number" name="horas_extras"
                   class="form-control input-dark"
                   value="{{ emple[6] }}" placeholder="Horas extras" min="0" required>
        </div>

        <!-- Bonificación -->
        <div class="input-group mb-4 rounded-3 overflow-hidden input-focus">
            <span class="input-group-text input-icon">
                <i class="bi bi-gift-fill"></i>
            </span>
            <input type="number" name="bonificacion"
                   class="form-control input-dark"
                   value="{{ emple[7] }}" placeholder="Bonificación" min="0" step="1000" required>
        </div>

        <!-- Botones -->
        <div class="d-flex gap-3">
            <a href="{{ url_for('inicio') }}"
               class="btn btn-cancelar w-50 rounded-3 text-center text-decoration-none d-flex align-items-center justify-content-center">
                Cancelar
            </a>
            <button type="submit" class="btn btn-guardar w-50 rounded-3">
                Actualizar
            </button>
        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
