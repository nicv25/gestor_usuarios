<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Datos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='editar_perfil_empleado.css') }}">
</head>
<body>

    <div class="login-card">

        <!-- Encabezado -->
        <div class="text-center mb-4">
            <h1 class="text-white fw-bold fs-4">Actualizar mis datos</h1>
            <p class="text-secondary mb-0">Modifica tu información personal</p>
        </div>

        <!-- Mensajes flash -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
            {{ message }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Formulario -->
        <form action="{{ url_for('editar_perfil_empleado') }}" method="POST">

            <!-- Nombre -->
            <div class="mb-3">
                <label class="form-label text-secondary">Nombre</label>
                <div class="input-wrapper">
                    <i class="bi bi-person input-icon"></i>
                    <input
                        type="text"
                        name="nombre"
                        class="form-control input-dark"
                        value="{{ emp[2] }}"
                        required
                    >
                </div>
            </div>

            <!-- Apellido -->
            <div class="mb-3">
                <label class="form-label text-secondary">Apellido</label>
                <div class="input-wrapper">
                    <i class="bi bi-person-fill input-icon"></i>
                    <input
                        type="text"
                        name="apellido"
                        class="form-control input-dark"
                        value="{{ emp[3] }}"
                        required
                    >
                </div>
            </div>

            <!-- Cargo -->
            <div class="mb-3">
                <label class="form-label text-secondary">Cargo</label>
                <div class="input-wrapper">
                    <i class="bi bi-briefcase input-icon"></i>
                    <input
                        type="text"
                        name="cargo"
                        class="form-control input-dark"
                        value="{{ emp[4] }}"
                        required
                    >
                </div>
            </div>

            <!-- Departamento -->
            <div class="mb-3">
                <label class="form-label text-secondary">Departamento</label>
                <div class="input-wrapper">
                    <i class="bi bi-building input-icon"></i>
                    <select name="id_area" class="form-control input-dark">
                        {% for area in areas %}
                        <option value="{{ area[0] }}" {% if area[0] == emp_area %} selected {% endif %}>
                            {{ area[1] }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Botones -->
            <div class="d-flex gap-3 mt-4">
                <button type="submit" class="btn-login flex-fill">
                    <i class="bi bi-check-circle me-2"></i>Guardar cambios
                </button>
                <a href="{{ url_for('panel_empleado') }}" class="btn-cancel flex-fill text-center">
                    <i class="bi bi-arrow-left me-2"></i>Cancelar
                </a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
